services:
  news-push:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-push
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL}
      NEWS_IMAGE_BASE_URL: ${NEWS_IMAGE_BASE_URL:-https://raw.githubusercontent.com/luckkyboy/news-data/main/static/images}
      STATE_FILE: /data/state.db
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
